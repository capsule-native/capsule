name: Release

# Tag a version (vX.Y.Z) to build, sign, notarize, staple, package, and publish. When the
# signing secrets are absent (e.g. on a fork), the job still builds + validates the pipeline
# but skips notarization/publishing — it never fails for want of credentials.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  release:
    name: Sign, notarize & publish
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARY_PROFILE: capsule-notary
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          appver="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' App/Info.plist)"
          if [ "$tag" != "$appver" ]; then
            echo "::error::Tag v$tag does not match App/Info.plist CFBundleShortVersionString ($appver). Bump Info.plist and re-tag so the packaged artifacts carry the right version."
            exit 1
          fi
          echo "Tag v$tag matches app version $appver."

      - name: Select newest available Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      - name: Install packaging tooling
        run: brew install xcodegen create-dmg

      - name: Determine signing availability
        id: signing
        env:
          CERT: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          # Require the full set (cert + team + Sparkle key) — otherwise the appcast can't be
          # signed, so drop cleanly to the unsigned build-only path instead of failing late.
          if [ -n "$CERT" ] && [ -n "${TEAM_ID}" ] && [ -n "$SPARKLE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets absent — building unsigned and skipping notarization/publish."
          fi

      # ── Signed path ──────────────────────────────────────────────────────────
      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Store notary credentials
        if: steps.signing.outputs.enabled == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      - name: Import Sparkle EdDSA private key
        if: steps.signing.outputs.enabled == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          keyfile="$RUNNER_TEMP/sparkle_ed_private_key"
          # generate_appcast --ed-key-file wants the base64 private-key STRING verbatim (exactly
          # what `generate_keys -x` writes: one line of base64). Accept the secret whether it was
          # stored as that string OR base64-encoded once more: a raw Sparkle key base64-decodes to
          # ~32 binary bytes, whereas a double-encoded secret decodes back to a printable base64
          # line. Pick whichever form yields a valid key string, so the release can't fail (or,
          # worse, silently emit an unsigned appcast) on a secret-encoding mismatch.
          dec="$RUNNER_TEMP/sparkle_key_decoded"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | base64 --decode > "$dec" 2>/dev/null || true
          if LC_ALL=C grep -aEq '^[A-Za-z0-9+/]{40,}={0,2}$' "$dec"; then
            cp "$dec" "$keyfile"                              # secret was double-base64-encoded
          else
            printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$keyfile" # secret stored verbatim
          fi
          rm -f "$dec"
          echo "SPARKLE_ED_KEY_FILE=$keyfile" >> "$GITHUB_ENV"

      - name: Warm the SwiftPM cache (resolves Sparkle's generate_appcast into .build/artifacts)
        if: steps.signing.outputs.enabled == 'true'
        # Belt-and-suspenders: the archive step also resolves Sparkle into DerivedData (which
        # appcast.sh searches), so a transient resolve hiccup must not block a shippable release.
        continue-on-error: true
        run: swift package resolve

      - name: Build, sign, notarize, staple, package, appcast
        if: steps.signing.outputs.enabled == 'true'
        env:
          # Point the appcast's enclosure URLs at this tag's Release assets. Empty on non-tag
          # (manual) runs, which makes generate_appcast fall back to relative filenames.
          RELEASE_DOWNLOAD_URL_PREFIX: ${{ startsWith(github.ref, 'refs/tags/') && format('https://github.com/{0}/releases/download/{1}/', github.repository, github.ref_name) || '' }}
        run: make release

      # ── Unsigned path (forks / missing secrets) ──────────────────────────────
      - name: Build app + validate pipeline (unsigned)
        if: steps.signing.outputs.enabled != 'true'
        run: |
          make app
          make release-dry

      # ── Publish ──────────────────────────────────────────────────────────────
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: capsule-release
          path: |
            dist/Capsule-*.dmg
            dist/Capsule-*.zip
            dist/appcast.xml
          if-no-files-found: ignore

      - name: Publish GitHub Release
        if: steps.signing.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Capsule-*.dmg
            dist/Capsule-*.zip
            dist/appcast.xml
          generate_release_notes: true
